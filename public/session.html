<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TutorConnect Session</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0f14; --surface: #16181f; --surface2: #1e2028;
  --border: #2a2d38; --accent: #6c63ff; --accent2: #00d2aa;
  --text: #e8eaf0; --muted: #6b7280; --danger: #ff4d6d; --warn: #f59e0b;
}

html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

/* ── Header ── */
.header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 10px; flex-wrap: wrap; min-height: 48px; }
.logo { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
.identity-chip { display: none; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px 3px 6px; font-size: 12px; }
.identity-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
.role-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 2px 6px; border-radius: 4px; background: rgba(108,99,255,.2); color: var(--accent); }
.role-badge.student { background: rgba(0,210,170,.15); color: var(--accent2); }
.status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
.status-dot.connected { background: var(--accent2); }
.status-dot.warn { background: var(--warn); animation: pulse 1s infinite; }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Whiteboard panel ── */
.whiteboard-panel { flex: 1; display: flex; flex-direction: column; background: #13141a; position: relative; min-width: 0; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.toolbar::-webkit-scrollbar { display: none; }
.toolbar-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.tool-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
.tool-btn:hover { background: var(--border); }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tool-btn:disabled { opacity: .3; pointer-events: none; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, transform .15s; flex-shrink: 0; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--text); }
.color-swatch.disabled { opacity: .3; pointer-events: none; }
.size-slider { -webkit-appearance: none; width: 72px; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; flex-shrink: 0; }
.size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.size-slider:disabled { opacity: .3; pointer-events: none; }
.divider { width: 1px; height: 22px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

/* Page tabs */
.page-bar { display: none; align-items: center; gap: 5px; padding: 4px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.page-bar::-webkit-scrollbar { display: none; }
.page-tab { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; flex-shrink: 0; transition: all .12s; font-family: 'DM Sans', sans-serif; }
.page-tab:hover { background: var(--border); color: var(--text); }
.page-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.add-page-btn { width: 24px; height: 24px; border-radius: 6px; font-size: 14px; cursor: pointer; background: transparent; border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .12s; }
.add-page-btn:hover { background: var(--border); color: var(--text); }

/* Draw permission banner */
.draw-banner { padding: 5px 12px; font-size: 11px; text-align: center; flex-shrink: 0; display: none; }
.draw-banner.show { display: block; }
.draw-banner.locked { background: rgba(245,158,11,.1); color: var(--warn); border-bottom: 1px solid rgba(245,158,11,.2); }
.draw-banner.open { background: rgba(0,210,170,.1); color: var(--accent2); border-bottom: 1px solid rgba(0,210,170,.2); }

/* Canvas */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas#whiteboard { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
canvas#whiteboard.tool-pen   { cursor: crosshair; }
canvas#whiteboard.tool-erase { cursor: cell; }
canvas#whiteboard.tool-move  { cursor: grab; }
canvas#whiteboard.tool-move:active { cursor: grabbing; }
canvas#whiteboard.tool-shape { cursor: crosshair; }
canvas#whiteboard.locked     { cursor: not-allowed; }

/* Drawing indicator */
.drawing-indicator { position: absolute; bottom: 12px; left: 12px; background: rgba(14,15,20,.85); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: var(--muted); backdrop-filter: blur(8px); opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 5; }
.drawing-indicator.visible { opacity: 1; }

/* Fullscreen buttons */
.fs-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 7px; background: rgba(0,0,0,.5); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; z-index: 6; opacity: .65; backdrop-filter: blur(4px); transition: opacity .2s; }
.fs-btn:hover { opacity: 1; }

/* Waiting overlay */
.waiting-overlay { position: absolute; inset: 0; background: rgba(14,15,20,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; backdrop-filter: blur(4px); transition: opacity .4s; }
.waiting-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.waiting-text { font-size: 14px; color: var(--muted); }
.waiting-name { font-size: 16px; font-weight: 600; color: var(--text); }

/* ── Video panel ── */
.video-panel { width: 270px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-left: 1px solid var(--border); }
.video-stack { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.video-slot { flex: 1; position: relative; background: #080910; overflow: hidden; border-bottom: 1px solid var(--border); }
.video-slot video { width: 100%; height: 100%; object-fit: cover; display: block; }
.video-label { position: absolute; bottom: 7px; left: 7px; font-size: 10px; font-weight: 600; color: white; background: rgba(0,0,0,.6); padding: 2px 8px; border-radius: 4px; pointer-events: none; }
.no-video { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 12px; }
.avatar-big { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: white; border: 2px solid var(--border); }
.vfs-btn { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 6px; background: rgba(0,0,0,.55); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0; transition: opacity .2s; backdrop-filter: blur(4px); }
.video-slot:hover .vfs-btn { opacity: 1; }

/* Draw permission toggle */
.perm-row { display: none; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.perm-row.show { display: flex; }
.perm-label { font-size: 12px; color: var(--muted); }
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: .25s; }
.toggle-track::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .25s; }
.toggle input:checked + .toggle-track { background: var(--accent2); }
.toggle input:checked + .toggle-track::before { transform: translateX(16px); }

/* Controls */
.controls { display: flex; justify-content: center; gap: 10px; padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
.ctrl-btn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s; background: var(--surface2); color: var(--text); }
.ctrl-btn:hover { transform: scale(1.08); }
.ctrl-btn.off { opacity: .4; }
.ctrl-btn.end { background: var(--danger); color: white; border-color: var(--danger); }
.ctrl-btn.end:hover { background: #e0003d; }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border); padding: 7px 16px; border-radius: 8px; font-size: 12px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 999; max-width: 300px; text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Overlay screens */
.oscreen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 9999; padding: 24px; text-align: center; }
.oscreen.show { display: flex; }
.oicon { font-size: 44px; } .otitle { font-size: 18px; font-weight: 600; }
.omsg { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.7; }
.obtn { margin-top: 6px; padding: 9px 24px; border-radius: 8px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; }

/* Mobile */
@media (max-width: 680px) {
  .main { flex-direction: column; }
  .video-panel { width: 100%; height: 150px; flex-direction: row; border-left: none; border-top: 1px solid var(--border); }
  .video-stack { flex-direction: row; }
  .video-slot { border-bottom: none; border-right: 1px solid var(--border); }
  .perm-row { display: none !important; }
  .controls { padding: 8px; gap: 8px; }
  .ctrl-btn { width: 38px; height: 38px; font-size: 14px; }
  .vfs-btn { opacity: .7; }
  .header { padding: 6px 10px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo"><div class="logo-dot"></div>TutorConnect</div>
  <div class="identity-chip" id="identityChip">
    <div class="identity-avatar" id="myAvatar"></div>
    <span id="myName">—</span>
    <span class="role-badge" id="myRole">—</span>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<div class="main">

  <!-- Whiteboard -->
  <div class="whiteboard-panel">

    <div class="toolbar" id="toolbar">
      <span class="toolbar-label">Tools</span>
      <div class="divider"></div>
      <!-- Draw tools -->
      <button class="tool-btn active" id="btnPen"   title="Pen">✏️</button>
      <button class="tool-btn"        id="btnLine"  title="Line">╱</button>
      <button class="tool-btn"        id="btnRect"  title="Rectangle">▭</button>
      <button class="tool-btn"        id="btnCirc"  title="Circle">◯</button>
      <button class="tool-btn"        id="btnArrow" title="Arrow">➜</button>
      <button class="tool-btn"        id="btnText"  title="Text">T</button>
      <button class="tool-btn"        id="btnErase" title="Eraser">⌫</button>
      <div class="divider"></div>
      <!-- Colors -->
      <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color-swatch" style="background:#6c63ff" data-color="#6c63ff"></div>
      <div class="color-swatch" style="background:#00d2aa" data-color="#00d2aa"></div>
      <div class="color-swatch" style="background:#ff4d6d" data-color="#ff4d6d"></div>
      <div class="color-swatch" style="background:#ffd166" data-color="#ffd166"></div>
      <div class="color-swatch" style="background:#60a5fa" data-color="#60a5fa"></div>
      <div class="divider"></div>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="30" value="3" title="Brush size"/>
      <div class="divider"></div>
      <button class="tool-btn" id="btnUndo"  title="Undo last stroke">↩</button>
      <button class="tool-btn" id="btnClear" title="Clear page" style="margin-left:auto">🗑️</button>
      <button class="tool-btn" id="wbFsBtn"  title="Fullscreen whiteboard">⛶</button>
    </div>

    <!-- Page tabs (tutor only) -->
    <div class="page-bar" id="pageBar">
      <div id="pageTabs"></div>
      <button class="add-page-btn" id="addPageBtn" title="New page">+</button>
    </div>

    <!-- Student draw permission banner -->
    <div class="draw-banner" id="drawBanner"></div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="whiteboard"></canvas>
      <div class="drawing-indicator" id="drawingIndicator">
        <span id="drawingName"></span> is drawing…
      </div>
      <button class="fs-btn" id="wbFsBtn2" title="Fullscreen">⛶</button>
      <div class="waiting-overlay" id="waitingOverlay">
        <div class="spinner"></div>
        <div class="waiting-text" id="waitingSubText">Waiting for other participant…</div>
        <div class="waiting-name" id="waitingName"></div>
      </div>
    </div>
  </div>

  <!-- Video panel -->
  <div class="video-panel">
    <!-- Draw permission toggle — tutor only -->
    <div class="perm-row" id="permRow">
      <span class="perm-label">✏️ Student can draw</span>
      <label class="toggle">
        <input type="checkbox" id="permToggle"/>
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="video-stack">
      <!-- Local video -->
      <div class="video-slot" id="localSlot">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label" id="localLabel">You</div>
        <button class="vfs-btn" id="localFsBtn" title="Fullscreen">⛶</button>
      </div>
      <!-- Remote video -->
      <div class="video-slot" id="remoteSlot">
        <div class="no-video" id="remoteNoVideo">
          <div class="avatar-big" id="remoteAvatar">👤</div>
          <span id="remoteWaitName">Waiting…</span>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none"></video>
        <div class="video-label" id="remoteLabel" style="display:none">
          <span id="remoteLabelText">—</span>
        </div>
        <button class="vfs-btn" id="remoteFsBtn" title="Fullscreen" style="display:none">⛶</button>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="muteBtn"  title="Mute/unmute">🎙️</button>
      <button class="ctrl-btn" id="videoBtn" title="Camera on/off">📷</button>
      <button class="ctrl-btn end" id="endBtn" title="End session">📵</button>
    </div>
  </div>

</div><!-- .main -->

<!-- Overlays -->
<div class="oscreen" id="errScreen">
  <div class="oicon">🚫</div><div class="otitle">Cannot join session</div>
  <div class="omsg" id="errMsg">Something went wrong.</div>
</div>
<div class="oscreen" id="endScreen">
  <div class="oicon">✅</div><div class="otitle">Session ended</div>
  <div class="omsg" id="endMsg">This session has ended.</div>
  <button class="obtn" onclick="window.close()">Close</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 1. IDENTITY — read from URL path
//    /session/:roomId/:userId
// ═══════════════════════════════════════════
const pathParts = location.pathname.split("/").filter(Boolean);
const roomId    = pathParts[1] || "";
const userId    = decodeURIComponent(pathParts[2] || "");

if (!roomId || !userId) showError("Invalid session link. Please use your assigned URL.");

// These are filled after server confirms identity
let myName   = "";
let myRole   = "";
let isTutor  = false;
let remoteUserName = "";
let peerConnection = null;
let localStream    = null;
let isMuted        = false;
let isVideoOff     = false;
let icePending     = []; // queue ICE candidates until remote desc is set
let remoteDescSet  = false;

const iceConfig = {
  iceServers: [
    { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
  ],
};

// ═══════════════════════════════════════════
// 2. HELPERS
// ═══════════════════════════════════════════
let toastTimer = null;
function showToast(msg, ms = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms);
}
function showError(msg) {
  document.getElementById("errMsg").textContent = msg;
  document.getElementById("errScreen").classList.add("show");
}
function showEnded(msg) {
  document.getElementById("endMsg").textContent = msg || "Session ended.";
  document.getElementById("endScreen").classList.add("show");
}
function setStatus(txt, connected, warning) {
  document.getElementById("statusText").textContent = txt;
  const d = document.getElementById("statusDot");
  d.className = "status-dot" + (connected ? " connected" : warning ? " warn" : "");
}
function initials(name) {
  return (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
}
function roleColor(role) {
  return role === "tutor" ? "#6c63ff" : "#00d2aa";
}

// ═══════════════════════════════════════════
// 3. SOCKET  — same simple setup as v1
// ═══════════════════════════════════════════
const socket = io({
  reconnection:         true,
  reconnectionAttempts: 15,
  reconnectionDelay:    1500,
  reconnectionDelayMax: 8000,
});

socket.on("connect", () => {
  setStatus("Connected", true);
  // Re-emit join on reconnect if we already have media
  if (localStream) socket.emit("join-room", { roomId, userId });
});
socket.on("disconnect",       () => setStatus("Reconnecting…", false, true));
socket.on("reconnect",        () => { setStatus("Connected", true); showToast("🔄 Reconnected"); });
socket.on("reconnect_failed", () => { setStatus("Connection lost"); showToast("❌ Connection lost. Please refresh.", 8000); });
socket.on("join-error",       ({ message }) => showError(message));
socket.on("error",            ({ message }) => showToast("⚠️ " + message));

// ═══════════════════════════════════════════
// 4. MEDIA — camera + mic
// ═══════════════════════════════════════════
async function startMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: true, noiseSuppression: true },
    });
  } catch (e) {
    try {
      // fallback: audio only
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      showToast("⚠️ No camera — audio only");
    } catch (e2) {
      showToast("⚠️ No camera or mic — whiteboard only");
      localStream = new MediaStream();
    }
  }
  document.getElementById("localVideo").srcObject = localStream;
  socket.emit("join-room", { roomId, userId });
}

// ═══════════════════════════════════════════
// 5. IDENTITY CONFIRMED — server responds
// ═══════════════════════════════════════════
socket.on("identity-confirmed", ({ name, role, participants, drawPermission, pages, activePage, connectedPeers }) => {
  myName  = name;
  myRole  = role;
  isTutor = role === "tutor";

  // Header chip
  const chip = document.getElementById("identityChip");
  chip.style.display = "flex";
  const av = document.getElementById("myAvatar");
  av.textContent = initials(name);
  av.style.background = roleColor(role);
  document.getElementById("myName").textContent = name;
  const rb = document.getElementById("myRole");
  rb.textContent = role;
  if (role === "student") rb.classList.add("student");

  document.getElementById("localLabel").textContent = name + " (You)";

  // Other participant info
  const other = Object.values(participants).find(p => p.userId !== userId);
  if (other) {
    remoteUserName = other.name;
    document.getElementById("waitingSubText").textContent = "Waiting for";
    document.getElementById("waitingName").textContent    = other.name + "…";
    document.getElementById("remoteWaitName").textContent = other.name;
    const ra = document.getElementById("remoteAvatar");
    ra.textContent       = initials(other.name);
    ra.style.background  = roleColor(other.role);
    document.getElementById("remoteLabelText").textContent = other.name;
  }

  // Tutor: show draw permission toggle + page bar
  if (isTutor) {
    document.getElementById("permRow").classList.add("show");
    document.getElementById("pageBar").style.display = "flex";
    document.getElementById("permToggle").checked = drawPermission;
  }

  // Apply draw permission state
  applyDrawPermission(drawPermission);

  // Replay board from server history
  WB.loadPages(pages || { "1": [] }, activePage || "1");

  // If other person already connected — start offer immediately
  if (connectedPeers && connectedPeers.length > 0) {
    document.getElementById("waitingName").textContent = "Establishing video…";
    startOffer();
  }
});

// ═══════════════════════════════════════════
// 6. DRAW PERMISSION
// ═══════════════════════════════════════════
function applyDrawPermission(allowed) {
  const locked = isTutor ? false : !allowed;
  WB.setLocked(locked);
  document.querySelectorAll(".color-swatch").forEach(el => el.classList.toggle("disabled", locked));
  ["btnPen","btnLine","btnRect","btnCirc","btnArrow","btnText","btnErase","btnUndo","btnClear"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = locked;
  });
  document.getElementById("sizeSlider").disabled = locked;

  if (!isTutor) {
    const b = document.getElementById("drawBanner");
    b.classList.add("show");
    b.className = "draw-banner show " + (allowed ? "open" : "locked");
    b.textContent = allowed ? "✏️ You can draw on the board" : "🔒 Drawing locked — waiting for tutor";
  }
}

document.getElementById("permToggle").addEventListener("change", function() {
  socket.emit("set-draw-permission", { roomId, allowed: this.checked });
});

socket.on("draw-permission-changed", ({ allowed }) => {
  applyDrawPermission(allowed);
  if (isTutor) {
    document.getElementById("permToggle").checked = allowed;
    showToast(allowed ? "✏️ Student can now draw" : "🔒 Student drawing locked");
  } else {
    showToast(allowed ? "✏️ You can now draw!" : "🔒 Drawing locked by tutor");
  }
});

// ═══════════════════════════════════════════
// 7. WEBRTC  — based on v1 working code
// ═══════════════════════════════════════════
function createPeer() {
  if (peerConnection) { try { peerConnection.close(); } catch(_){} }
  peerConnection = null;
  remoteDescSet  = false;
  icePending     = [];

  const pc = new RTCPeerConnection(iceConfig);

  // Add all local tracks
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // Remote stream arrives
  pc.ontrack = (e) => {
    const rv = document.getElementById("remoteVideo");
    rv.srcObject = e.streams[0];
    rv.style.display = "block";
    rv.play().catch(() => {});
    document.getElementById("remoteNoVideo").style.display  = "none";
    document.getElementById("remoteLabel").style.display    = "block";
    document.getElementById("remoteFsBtn").style.display    = "block";
    document.getElementById("waitingOverlay").classList.add("hidden");
    setStatus("Connected", true);
    showToast("✅ " + (remoteUserName || "Participant") + " joined!");
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", { roomId, candidate: e.candidate });
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if (s === "connected")    setStatus("Connected", true);
    if (s === "connecting")   setStatus("Connecting…", false, true);
    if (s === "disconnected") {
      setStatus("Reconnecting…", false, true);
      // Try ICE restart after 3s
      setTimeout(() => { if (peerConnection && peerConnection.connectionState === "disconnected") tryRestartICE(); }, 3000);
    }
    if (s === "failed") {
      setStatus("Reconnecting…", false, true);
      showToast("⚠️ Video dropped — retrying…");
      setTimeout(startOffer, 1500);
    }
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === "failed") tryRestartICE();
  };

  peerConnection = pc;
  return pc;
}

async function startOffer() {
  const pc = createPeer();
  try {
    const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
    await pc.setLocalDescription(offer);
    socket.emit("offer", { roomId, offer });
  } catch(e) { console.error("[startOffer]", e.message); }
}

async function tryRestartICE() {
  if (!peerConnection) return;
  try {
    const offer = await peerConnection.createOffer({ iceRestart: true });
    await peerConnection.setLocalDescription(offer);
    socket.emit("offer", { roomId, offer });
  } catch(e) { startOffer(); }
}

async function flushICE() {
  const q = [...icePending]; icePending = [];
  for (const c of q) {
    try { await peerConnection.addIceCandidate(new RTCIceCandidate(c)); }
    catch(e) { console.warn("[ICE flush]", e.message); }
  }
}

// Someone new joined → we send the offer
socket.on("peer-joined", async ({ userId: pid, name, role }) => {
  remoteUserName = name;
  document.getElementById("remoteLabelText").textContent = name;
  document.getElementById("remoteWaitName").textContent  = name;
  const ra = document.getElementById("remoteAvatar");
  ra.textContent = initials(name); ra.style.background = roleColor(role);
  document.getElementById("waitingName").textContent = "Establishing video…";
  showToast("👋 " + name + " joined");
  await startOffer();
});

// We receive an offer → send answer
socket.on("offer", async ({ offer }) => {
  createPeer();
  try {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    remoteDescSet = true;
    await flushICE();
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit("answer", { roomId, answer });
  } catch(e) { console.error("[offer handler]", e.message); }
});

socket.on("answer", async ({ answer }) => {
  if (!peerConnection) return;
  try {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
    remoteDescSet = true;
    await flushICE();
  } catch(e) { console.error("[answer handler]", e.message); }
});

socket.on("ice-candidate", async ({ candidate }) => {
  if (!peerConnection) return;
  if (!remoteDescSet) { icePending.push(candidate); return; }
  try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); }
  catch(e) { console.warn("[ICE add]", e.message); }
});

socket.on("peer-left", ({ name }) => {
  const rv = document.getElementById("remoteVideo");
  rv.style.display = "none"; rv.srcObject = null;
  document.getElementById("remoteNoVideo").style.display  = "flex";
  document.getElementById("remoteLabel").style.display    = "none";
  document.getElementById("remoteFsBtn").style.display    = "none";
  document.getElementById("waitingOverlay").classList.remove("hidden");
  document.getElementById("waitingName").textContent = (name || "Participant") + "…";
  setStatus("Waiting…");
  showToast((name || "Participant") + " left the session");
  if (peerConnection) { try { peerConnection.close(); } catch(_){} peerConnection = null; }
});

socket.on("session-ended", ({ reason } = {}) => {
  if (peerConnection) { try { peerConnection.close(); } catch(_){} }
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  showEnded(reason || "Session ended.");
});

// ═══════════════════════════════════════════
// 8. CONTROLS
// ═══════════════════════════════════════════
document.getElementById("muteBtn").onclick = () => {
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const b = document.getElementById("muteBtn");
  b.textContent = isMuted ? "🔇" : "🎙️";
  b.classList.toggle("off", isMuted);
};

document.getElementById("videoBtn").onclick = () => {
  isVideoOff = !isVideoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  const b = document.getElementById("videoBtn");
  b.textContent = isVideoOff ? "🚫" : "📷";
  b.classList.toggle("off", isVideoOff);
};

document.getElementById("endBtn").onclick = () => {
  if (confirm("End this session?")) {
    if (peerConnection) { try { peerConnection.close(); } catch(_){} }
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    showEnded("You ended the session.");
  }
};

// Fullscreen
function goFullscreen(el) {
  try {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    }
  } catch(e) {}
}
document.getElementById("localFsBtn").onclick  = () => goFullscreen(document.getElementById("localSlot"));
document.getElementById("remoteFsBtn").onclick = () => goFullscreen(document.getElementById("remoteSlot"));
document.getElementById("wbFsBtn").onclick     = () => goFullscreen(document.getElementById("canvasWrap"));
document.getElementById("wbFsBtn2").onclick    = () => goFullscreen(document.getElementById("canvasWrap"));

// ═══════════════════════════════════════════
// 9. WHITEBOARD ENGINE
// Builds directly on v1 working draw code.
// Adds: shapes, text, pages, undo, normalized coords, board persistence.
// ═══════════════════════════════════════════
const WB = (() => {
  const canvas  = document.getElementById("whiteboard");
  const ctx     = canvas.getContext("2d");

  let tool      = "pen"; // pen | line | rect | circ | arrow | text | erase
  let color     = "#ffffff";
  let size      = 3;
  let locked    = false;
  let drawing   = false;
  let startNX   = 0, startNY = 0; // normalized start coords
  let lastNX    = 0, lastNY  = 0; // normalized last coords
  let activePage = "1";
  const pages   = {};              // pageId → [commands]
  let drawIndTmr = null;

  // ── Canvas sizing ──
  // Save as dataURL before resize, restore after
  let snapURL = null;
  function resize() {
    const w = canvas.parentElement.offsetWidth;
    const h = canvas.parentElement.offsetHeight;
    if (!w || !h) return;
    if (canvas.width > 0 && canvas.height > 0) snapURL = canvas.toDataURL();
    canvas.width  = w;
    canvas.height = h;
    redraw(); // redraw from stored commands (better than snapshot)
  }
  new ResizeObserver(resize).observe(canvas.parentElement);

  // ── Coord helpers ──
  // Always normalize to 0–1 before sending.
  // This ensures the drawing looks identical on any screen size.
  function norm(px, py) {
    return { nx: canvas.width  ? px / canvas.width  : 0,
             ny: canvas.height ? py / canvas.height : 0 };
  }
  function denorm(nx, ny) {
    return { x: nx * canvas.width, y: ny * canvas.height };
  }
  function getEvtPos(e) {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { px: s.clientX - r.left, py: s.clientY - r.top };
  }

  // ── Draw a single command ──
  function applyCmd(cmd) {
    if (!cmd || !cmd.type) return;
    ctx.save();
    ctx.lineCap = ctx.lineJoin = "round";
    const w = Math.max(1, cmd.size || 3);
    const c = cmd.color || "#fff";

    if (cmd.type === "stroke") {
      const {x:x0,y:y0} = denorm(cmd.nx0, cmd.ny0);
      const {x:x1,y:y1} = denorm(cmd.nx1, cmd.ny1);
      ctx.globalCompositeOperation = cmd.erase ? "destination-out" : "source-over";
      ctx.strokeStyle = cmd.erase ? "rgba(0,0,0,1)" : c;
      ctx.lineWidth   = w;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();

    } else if (cmd.type === "line") {
      const {x:x0,y:y0} = denorm(cmd.nx0, cmd.ny0);
      const {x:x1,y:y1} = denorm(cmd.nx1, cmd.ny1);
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = c; ctx.lineWidth = w;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();

    } else if (cmd.type === "rect") {
      const {x:x0,y:y0} = denorm(cmd.nx0, cmd.ny0);
      const {x:x1,y:y1} = denorm(cmd.nx1, cmd.ny1);
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = c; ctx.lineWidth = w;
      ctx.strokeRect(x0, y0, x1-x0, y1-y0);

    } else if (cmd.type === "circ") {
      const {x:cx,y:cy} = denorm(cmd.ncx, cmd.ncy);
      const {x:rx,y:ry} = denorm(cmd.nrx, cmd.nry);
      const rad = Math.sqrt((rx-cx)**2 + (ry-cy)**2);
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = c; ctx.lineWidth = w;
      ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,rad),0,Math.PI*2); ctx.stroke();

    } else if (cmd.type === "arrow") {
      const {x:x0,y:y0} = denorm(cmd.nx0, cmd.ny0);
      const {x:x1,y:y1} = denorm(cmd.nx1, cmd.ny1);
      const angle = Math.atan2(y1-y0, x1-x0);
      const hs    = Math.max(8, w * 4);
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = c; ctx.fillStyle = c; ctx.lineWidth = w;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - hs * Math.cos(angle - 0.4), y1 - hs * Math.sin(angle - 0.4));
      ctx.lineTo(x1 - hs * Math.cos(angle + 0.4), y1 - hs * Math.sin(angle + 0.4));
      ctx.closePath(); ctx.fill();

    } else if (cmd.type === "text") {
      const {x,y} = denorm(cmd.nx, cmd.ny);
      const fs = Math.max(14, w * 6);
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = c;
      ctx.font      = `${fs}px DM Sans, sans-serif`;
      ctx.fillText(cmd.text || "", x, y);

    } else if (cmd.type === "clear") {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    ctx.restore();
  }

  // ── Redraw whole page from stored commands ──
  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cmds = pages[activePage] || [];
    cmds.forEach(applyCmd);
  }

  // ── Load pages from server (called after identity-confirmed) ──
  function loadPages(pagesData, active) {
    Object.keys(pagesData).forEach(pid => { pages[pid] = pagesData[pid] || []; });
    activePage = active || "1";
    if (!pages[activePage]) pages[activePage] = [];
    renderPageTabs();
    if (canvas.width > 0 && canvas.height > 0) redraw();
    else setTimeout(redraw, 100); // wait for resize
  }

  // ── Page tabs ──
  function renderPageTabs() {
    const bar = document.getElementById("pageTabs");
    if (!bar) return;
    bar.innerHTML = "";
    Object.keys(pages).forEach(pid => {
      const b = document.createElement("button");
      b.className   = "page-tab" + (pid === activePage ? " active" : "");
      b.textContent = "Page " + pid;
      b.onclick     = () => { if (isTutor) socket.emit("switch-page", { roomId, pageId: pid }); };
      bar.appendChild(b);
    });
  }

  socket.on("page-changed", ({ pages: pageIds, activePage: ap }) => {
    // Ensure all pages exist locally
    pageIds.forEach(pid => { if (!pages[pid]) pages[pid] = []; });
    activePage = ap;
    renderPageTabs();
    redraw();
  });

  socket.on("clear-page", ({ pageId }) => {
    pages[pageId] = [];
    if (pageId === activePage) redraw();
  });

  document.getElementById("addPageBtn")?.addEventListener("click", () => {
    if (isTutor) socket.emit("add-page", { roomId });
  });

  // ── Shape preview (drawn temporarily while dragging) ──
  let previewCmd = null;
  function drawPreview() {
    redraw();
    if (previewCmd) applyCmd(previewCmd);
  }

  // ── Pointer events ──
  canvas.addEventListener("pointerdown", e => {
    if (locked) return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);

    if (tool === "text") {
      const { px, py } = getEvtPos(e);
      const txt = prompt("Enter text:");
      if (!txt) return;
      const { nx, ny } = norm(px, py);
      const cmd = { type:"text", nx, ny, text:txt, color, size, pageId:activePage };
      pushAndSend(cmd); applyCmd(cmd);
      return;
    }

    drawing = true;
    const { px, py } = getEvtPos(e);
    const { nx, ny } = norm(px, py);
    startNX = nx; startNY = ny;
    lastNX  = nx; lastNY  = ny;
  });

  canvas.addEventListener("pointermove", e => {
    if (!drawing || locked) return;
    e.preventDefault();
    const { px, py } = getEvtPos(e);
    const { nx, ny } = norm(px, py);

    if (tool === "pen" || tool === "erase") {
      const cmd = { type:"stroke", nx0:lastNX, ny0:lastNY, nx1:nx, ny1:ny, color, size, erase: tool==="erase", pageId:activePage };
      pushAndSend(cmd); applyCmd(cmd);
      lastNX = nx; lastNY = ny;
    } else {
      // Shape preview
      previewCmd = makeShapeCmd(nx, ny);
      drawPreview();
    }
  });

  canvas.addEventListener("pointerup", e => {
    if (!drawing) return;
    drawing = false;
    if (tool === "pen" || tool === "erase" || tool === "text") { previewCmd = null; return; }
    const { px, py } = getEvtPos(e);
    const { nx, ny } = norm(px, py);
    const cmd = makeShapeCmd(nx, ny);
    if (cmd) { pushAndSend(cmd); redraw(); applyCmd(cmd); }
    previewCmd = null;
  });

  canvas.addEventListener("pointercancel", () => { drawing = false; previewCmd = null; });

  function makeShapeCmd(nx, ny) {
    if (tool === "line")  return { type:"line",  nx0:startNX, ny0:startNY, nx1:nx, ny1:ny, color, size, pageId:activePage };
    if (tool === "rect")  return { type:"rect",  nx0:startNX, ny0:startNY, nx1:nx, ny1:ny, color, size, pageId:activePage };
    if (tool === "circ")  return { type:"circ",  ncx:startNX, ncy:startNY, nrx:nx, nry:ny, color, size, pageId:activePage };
    if (tool === "arrow") return { type:"arrow", nx0:startNX, ny0:startNY, nx1:nx, ny1:ny, color, size, pageId:activePage };
    return null;
  }

  // ── Store locally and send to server ──
  function pushAndSend(cmd) {
    if (!pages[activePage]) pages[activePage] = [];
    pages[activePage].push(cmd);
    socket.emit("draw", { roomId, data: cmd });
  }

  // ── Receive remote draw events ──
  socket.on("draw", ({ senderName, ...data }) => {
    const pid = data.pageId || activePage;
    if (!pages[pid]) pages[pid] = [];
    pages[pid].push(data);
    if (pid === activePage) applyCmd(data);

    // Show "X is drawing" indicator
    document.getElementById("drawingName").textContent = senderName || "Other";
    const ind = document.getElementById("drawingIndicator");
    ind.classList.add("visible");
    clearTimeout(drawIndTmr);
    drawIndTmr = setTimeout(() => ind.classList.remove("visible"), 1500);
  });

  // ── Undo (local only) ──
  function undo() {
    if (!pages[activePage]?.length) return;
    pages[activePage].pop();
    redraw();
  }

  // ── Tool buttons ──
  const toolMap = {
    btnPen:   "pen",
    btnLine:  "line",
    btnRect:  "rect",
    btnCirc:  "circ",
    btnArrow: "arrow",
    btnText:  "text",
    btnErase: "erase",
  };
  Object.entries(toolMap).forEach(([id, t]) => {
    document.getElementById(id)?.addEventListener("click", () => setTool(t));
  });

  function setTool(t) {
    tool = t;
    Object.keys(toolMap).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle("active", toolMap[id] === t);
    });
    const cls = locked ? "locked" : (t === "erase" ? "tool-erase" : t === "pen" ? "tool-pen" : "tool-shape");
    canvas.className = cls;
  }

  document.getElementById("btnUndo")?.addEventListener("click", undo);

  document.getElementById("btnClear")?.addEventListener("click", () => {
    if (locked) return;
    if (!confirm("Clear this page?")) return;
    pages[activePage] = [];
    redraw();
    socket.emit("clear-page", { roomId, pageId: activePage });
  });

  document.querySelectorAll(".color-swatch").forEach(el => {
    el.addEventListener("click", () => {
      if (locked) return;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
      color = el.dataset.color;
      if (tool === "erase") setTool("pen");
    });
  });

  document.getElementById("sizeSlider").addEventListener("input", e => { size = parseInt(e.target.value); });

  // ── Public API ──
  return {
    loadPages,
    setLocked(v) {
      locked = v;
      canvas.className = v ? "locked" : "tool-pen";
    },
  };
})();

// ═══════════════════════════════════════════
// 10. START
// ═══════════════════════════════════════════
applyDrawPermission(false); // default locked until server confirms
startMedia();
</script>
