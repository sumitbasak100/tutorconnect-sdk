<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TutorConnect Session</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2028;
    --border: #2a2d38;
    --accent: #6c63ff;
    --accent2: #00d2aa;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --danger: #ff4d6d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }

  .logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    flex-shrink: 0;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }

  .identity-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px 4px 8px;
    font-size: 12px;
  }
  .identity-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: white;
  }
  .role-badge {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    padding: 2px 6px; border-radius: 4px;
    background: rgba(108,99,255,.2); color: var(--accent);
  }
  .role-badge.student { background: rgba(0,210,170,.15); color: var(--accent2); }

  .room-id {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2);
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    padding: 4px 10px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background .3s; }
  .status-dot.connected { background: var(--accent2); }

  /* ── Main ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Whiteboard ── */
  .whiteboard-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #1a1b22; position: relative;
  }

  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }

  .tool-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all .15s;
  }
  .tool-btn:hover { background: var(--border); }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); }

  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color .15s, transform .15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--text); }

  .size-slider {
    -webkit-appearance: none; width: 80px; height: 4px;
    border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
  }
  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }

  .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .clear-btn {
    margin-left: auto; padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .clear-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

  /* Who's drawing indicator */
  .drawing-indicator {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(14,15,20,.85); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; color: var(--text-muted);
    backdrop-filter: blur(8px);
    opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 5;
  }
  .drawing-indicator.visible { opacity: 1; }

  canvas { flex: 1; display: block; cursor: crosshair; touch-action: none; }

  /* ── Video panel ── */
  .video-panel {
    width: 280px; flex-shrink: 0;
    display: flex; flex-direction: column;
    background: var(--surface); border-left: 1px solid var(--border);
  }

  .video-stack { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .video-slot {
    flex: 1; position: relative;
    background: #0a0b10; overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .video-slot video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .video-label {
    position: absolute; bottom: 8px; left: 8px;
    font-size: 11px; font-weight: 500; color: white;
    background: rgba(0,0,0,.55); padding: 3px 8px;
    border-radius: 5px; backdrop-filter: blur(6px);
    display: flex; align-items: center; gap: 5px;
  }
  .video-label .role-dot { width: 5px; height: 5px; border-radius: 50%; }

  .no-video {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--text-muted); font-size: 13px;
  }
  .avatar-big {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: white;
    border: 2px solid var(--border);
  }

  /* ── Controls ── */
  .controls {
    display: flex; justify-content: center; gap: 10px;
    padding: 14px 12px; border-top: 1px solid var(--border);
  }
  .ctrl-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .15s;
    background: var(--surface2); color: var(--text);
  }
  .ctrl-btn:hover { transform: scale(1.08); }
  .ctrl-btn.off { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
  .ctrl-btn.end { background: var(--danger); color: white; border-color: var(--danger); }
  .ctrl-btn.end:hover { background: #e0003d; }

  /* ── Waiting overlay ── */
  .waiting-overlay {
    position: absolute; inset: 0;
    background: rgba(14,15,20,.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    z-index: 10; backdrop-filter: blur(4px);
  }
  .waiting-overlay.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .waiting-text { font-size: 14px; color: var(--text-muted); }
  .waiting-sub  { font-size: 12px; color: var(--text-muted); opacity: .6; }
  .waiting-room { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); background: rgba(108,99,255,.1); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(108,99,255,.3); }

  /* ── Error screen ── */
  .error-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    z-index: 100;
  }
  .error-screen.hidden { display: none; }
  .error-icon { font-size: 40px; }
  .error-msg  { font-size: 15px; color: var(--text-muted); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 8px 18px; border-radius: 8px; font-size: 13px; color: var(--text);
    opacity: 0; pointer-events: none; transition: all .3s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Error screen (shown if userId/name missing) -->
<div class="error-screen hidden" id="errorScreen">
  <div class="error-icon">🔒</div>
  <div style="font-size:18px;font-weight:600">Access Denied</div>
  <div class="error-msg">This session requires a valid user ID and name.</div>
  <div class="error-msg" style="font-size:12px;opacity:.5">Add ?userId=X&name=Y to the URL</div>
</div>

<div class="header">
  <div class="logo"><div class="logo-dot"></div>TutorConnect</div>
  <div class="identity-chip" id="identityChip" style="display:none">
    <div class="identity-avatar" id="myAvatar"></div>
    <span id="myName">—</span>
    <span class="role-badge" id="myRole">—</span>
  </div>
  <div class="room-id" id="roomIdLabel">Room: —</div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<div class="main">
  <!-- Whiteboard -->
  <div class="whiteboard-panel">
    <div class="toolbar">
      <span class="toolbar-label">Board</span>
      <div class="divider"></div>
      <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color-swatch" style="background:#6c63ff" data-color="#6c63ff"></div>
      <div class="color-swatch" style="background:#00d2aa" data-color="#00d2aa"></div>
      <div class="color-swatch" style="background:#ff4d6d" data-color="#ff4d6d"></div>
      <div class="color-swatch" style="background:#ffd166" data-color="#ffd166"></div>
      <div class="divider"></div>
      <button class="tool-btn" id="eraserBtn" title="Eraser">⌫</button>
      <div class="divider"></div>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="20" value="3"/>
      <button class="clear-btn" id="clearBtn">Clear All</button>
    </div>
    <canvas id="whiteboard"></canvas>
    <div class="drawing-indicator" id="drawingIndicator">✏️ <span id="drawingName"></span> is drawing…</div>

    <!-- Waiting overlay -->
    <div class="waiting-overlay" id="waitingOverlay">
      <div class="spinner"></div>
      <div class="waiting-text">Waiting for the other person…</div>
      <div class="waiting-sub" id="waitingSubText"></div>
      <div class="waiting-room" id="overlayRoomId"></div>
    </div>
  </div>

  <!-- Video -->
  <div class="video-panel">
    <div class="video-stack">
      <div class="video-slot">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label">
          <div class="role-dot" id="localRoleDot" style="background:#6c63ff"></div>
          <span id="localLabel">You</span>
        </div>
      </div>
      <div class="video-slot">
        <div class="no-video" id="remoteNoVideo">
          <div class="avatar-big" id="remoteAvatar" style="background:#2a2d38">👤</div>
          <span id="remoteWaitName">Waiting…</span>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none"></video>
        <div class="video-label" id="remoteLabel" style="display:none">
          <div class="role-dot" id="remoteRoleDot" style="background:#00d2aa"></div>
          <span id="remoteLabelText">—</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="muteBtn" title="Mute mic">🎙️</button>
      <button class="ctrl-btn" id="videoBtn" title="Toggle camera">📷</button>
      <button class="ctrl-btn end" id="endBtn" title="End session">📵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Read identity from URL ────────────────────────────────────
const params   = new URLSearchParams(location.search);
const roomId   = location.pathname.split("/").pop();
const userId   = params.get("userId");
const userName = params.get("name");

// Guard — must have userId + name
if (!userId || !userName) {
  document.getElementById("errorScreen").classList.remove("hidden");
  throw new Error("Missing userId or name");
}

// ── Helpers ──────────────────────────────────────────────────
function initials(name) {
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}
function roleColor(role) {
  return role === "tutor" ? "#6c63ff" : "#00d2aa";
}
function showToast(msg, duration = 2800) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

// ── Setup UI with identity ───────────────────────────────────
document.getElementById("roomIdLabel").textContent = `Room: ${roomId}`;
document.getElementById("overlayRoomId").textContent = roomId;
document.getElementById("myName").textContent = userName;

const myAvatar = document.getElementById("myAvatar");
myAvatar.textContent = initials(userName);
myAvatar.style.background = "#6c63ff";

// ── Socket + WebRTC ─────────────────────────────────────────
const socket  = io();
let localStream     = null;
let peerConnection  = null;
let isMuted         = false;
let isVideoOff      = false;
let remoteUserName  = null;

const iceConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
  ],
};

// ── Media ────────────────────────────────────────────────────
async function startMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById("localVideo").srcObject = localStream;
  } catch {
    showToast("⚠️ Camera/mic not available — audio only");
    localStream = new MediaStream();
  }
  // Join room with identity
  socket.emit("join-room", { roomId, userId, name: userName });
}

// ── Server confirms identity ──────────────────────────────────
socket.on("identity-confirmed", ({ role, participants }) => {
  const chip = document.getElementById("identityChip");
  chip.style.display = "flex";

  const roleEl = document.getElementById("myRole");
  roleEl.textContent = role;
  if (role === "student") roleEl.classList.add("student");

  myAvatar.style.background = roleColor(role);
  document.getElementById("localRoleDot").style.background = roleColor(role);
  document.getElementById("localLabel").textContent = `${userName} (You)`;

  // Update waiting text with the other person's name
  const other = Object.values(participants).find(p => p.userId !== userId);
  if (other) {
    document.getElementById("waitingSubText").textContent = `Waiting for ${other.name}…`;
    document.getElementById("remoteWaitName").textContent = other.name;
    const ra = document.getElementById("remoteAvatar");
    ra.textContent = initials(other.name);
    ra.style.background = roleColor(other.role);
  }
});

// ── WebRTC ────────────────────────────────────────────────────
function createPeer() {
  const pc = new RTCPeerConnection(iceConfig);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = (e) => {
    const rv = document.getElementById("remoteVideo");
    rv.srcObject = e.streams[0];
    rv.style.display = "block";
    document.getElementById("remoteNoVideo").style.display   = "none";
    document.getElementById("remoteLabel").style.display     = "flex";
    document.getElementById("remoteLabelText").textContent   = remoteUserName || "Participant";
    document.getElementById("waitingOverlay").classList.add("hidden");
    document.getElementById("statusDot").classList.add("connected");
    document.getElementById("statusText").textContent = "Connected";
    showToast(`✅ ${remoteUserName || "Other participant"} joined!`);
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", { roomId, candidate: e.candidate });
  };

  pc.onconnectionstatechange = () => {
    if (["disconnected","failed","closed"].includes(pc.connectionState)) {
      document.getElementById("remoteVideo").style.display     = "none";
      document.getElementById("remoteNoVideo").style.display   = "flex";
      document.getElementById("remoteLabel").style.display     = "none";
      document.getElementById("waitingOverlay").classList.remove("hidden");
      document.getElementById("statusDot").classList.remove("connected");
      document.getElementById("statusText").textContent = "Reconnecting…";
    }
  };

  return pc;
}

socket.on("peer-joined", async ({ userId: pid, name }) => {
  remoteUserName = name;
  document.getElementById("remoteLabelText").textContent = name;
  const ra = document.getElementById("remoteAvatar");
  ra.textContent = initials(name);
  peerConnection = createPeer();
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit("offer", { roomId, offer });
});

socket.on("offer", async ({ offer }) => {
  peerConnection = createPeer();
  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("answer", { roomId, answer });
});

socket.on("answer", async ({ answer }) => {
  await peerConnection?.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on("ice-candidate", async ({ candidate }) => {
  try { await peerConnection?.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
});

socket.on("peer-left", ({ name }) => {
  document.getElementById("remoteVideo").style.display     = "none";
  document.getElementById("remoteNoVideo").style.display   = "flex";
  document.getElementById("remoteLabel").style.display     = "none";
  document.getElementById("waitingOverlay").classList.remove("hidden");
  document.getElementById("statusDot").classList.remove("connected");
  document.getElementById("statusText").textContent = "Waiting…";
  showToast(`${name} left the session`);
});

socket.on("session-ended", () => {
  showToast("Session ended");
  setTimeout(() => window.close(), 2000);
});

socket.on("error", ({ message }) => showToast(`⚠️ ${message}`));

// ── Controls ─────────────────────────────────────────────────
document.getElementById("muteBtn").onclick = () => {
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById("muteBtn");
  btn.textContent = isMuted ? "🔇" : "🎙️";
  btn.classList.toggle("off", isMuted);
};

document.getElementById("videoBtn").onclick = () => {
  isVideoOff = !isVideoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  const btn = document.getElementById("videoBtn");
  btn.textContent = isVideoOff ? "🚫" : "📷";
  btn.classList.toggle("off", isVideoOff);
};

document.getElementById("endBtn").onclick = () => {
  if (confirm("End this session?")) {
    peerConnection?.close();
    localStream?.getTracks().forEach(t => t.stop());
    window.close();
  }
};

// ── Whiteboard ────────────────────────────────────────────────
const canvas = document.getElementById("whiteboard");
const ctx    = canvas.getContext("2d");
let drawing  = false, lastX = 0, lastY = 0;
let penColor = "#ffffff", penSize = 3, isEraser = false;
let drawTimeout = null;

function resizeCanvas() {
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.putImageData(img, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function getPos(e) {
  const r   = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function drawStroke(x0, y0, x1, y1, color, size, eraser) {
  ctx.globalCompositeOperation = eraser ? "destination-out" : "source-over";
  ctx.strokeStyle = color;
  ctx.lineWidth   = size;
  ctx.lineCap = ctx.lineJoin = "round";
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
}

canvas.addEventListener("pointerdown", (e) => { drawing = true; const {x,y} = getPos(e); lastX=x; lastY=y; });
canvas.addEventListener("pointermove", (e) => {
  if (!drawing) return;
  const {x, y} = getPos(e);
  drawStroke(lastX, lastY, x, y, penColor, penSize, isEraser);
  socket.emit("draw", { roomId, data: { x0:lastX, y0:lastY, x1:x, y1:y, color:penColor, size:penSize, eraser:isEraser } });
  lastX = x; lastY = y;
});
canvas.addEventListener("pointerup",    () => drawing = false);
canvas.addEventListener("pointerleave", () => drawing = false);

// Remote draw + "who is drawing" indicator
let drawIndicatorTimer = null;
socket.on("draw", ({ x0, y0, x1, y1, color, size, eraser }) => {
  drawStroke(x0, y0, x1, y1, color, size, eraser);
  const ind  = document.getElementById("drawingIndicator");
  document.getElementById("drawingName").textContent = remoteUserName || "Participant";
  ind.classList.add("visible");
  clearTimeout(drawIndicatorTimer);
  drawIndicatorTimer = setTimeout(() => ind.classList.remove("visible"), 1200);
});

socket.on("clear-board", () => ctx.clearRect(0, 0, canvas.width, canvas.height));

// Color swatches
document.querySelectorAll(".color-swatch").forEach(el => {
  el.onclick = () => {
    document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    penColor = el.dataset.color;
    isEraser = false;
    document.getElementById("eraserBtn").classList.remove("active");
  };
});

document.getElementById("eraserBtn").onclick = () => {
  isEraser = !isEraser;
  document.getElementById("eraserBtn").classList.toggle("active", isEraser);
};

document.getElementById("sizeSlider").oninput = (e) => penSize = parseInt(e.target.value);

document.getElementById("clearBtn").onclick = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  socket.emit("clear-board", { roomId });
};

// ── Start ─────────────────────────────────────────────────────
startMedia();
</script>
</body>
</html>
