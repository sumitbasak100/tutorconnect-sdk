<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TutorConnect Session</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f14;--surface:#16181f;--surface2:#1e2028;
  --border:#2a2d38;--accent:#6c63ff;--accent2:#00d2aa;
  --text:#e8eaf0;--muted:#6b7280;--danger:#ff4d6d;--warn:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;white-space:nowrap}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.user-badge{display:flex;align-items:center;gap:7px;padding:4px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px}
.user-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0}
.role-tutor{background:var(--accent)}
.role-student{background:var(--accent2);color:#000}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
.status-dot.connected{background:var(--accent2)}
.status-dot.reconnecting{background:var(--warn);animation:pulse 1s infinite}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}

/* Whiteboard */
.wb-panel{flex:1;display:flex;flex-direction:column;background:#1a1b22;position:relative;min-width:0}
.toolbar{display:flex;align-items:center;gap:7px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tb-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:2px}
.tool-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.tool-btn:hover:not(:disabled){background:var(--border)}
.tool-btn.active{background:var(--accent);border-color:var(--accent)}
.tool-btn:disabled,.size-slider:disabled{opacity:.3;cursor:not-allowed}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;flex-shrink:0}
.color-swatch:hover:not(.disabled){transform:scale(1.15)}
.color-swatch.active{border-color:var(--text)}
.color-swatch.disabled{opacity:.3;pointer-events:none}
.size-slider{-webkit-appearance:none;width:70px;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.divider{width:1px;height:24px;background:var(--border);margin:0 2px;flex-shrink:0}
.clear-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
.clear-btn:hover:not(:disabled){background:var(--danger);color:white;border-color:var(--danger)}
.clear-btn:disabled{opacity:.3;cursor:not-allowed}

/* Student draw banner */
.draw-banner{padding:6px 14px;font-size:12px;text-align:center;flex-shrink:0;display:none}
.draw-banner.show{display:block}
.draw-banner.locked{background:rgba(245,158,11,.1);color:var(--warn);border-bottom:1px solid rgba(245,158,11,.2)}
.draw-banner.unlocked{background:rgba(0,210,170,.1);color:var(--accent2);border-bottom:1px solid rgba(0,210,170,.2)}

canvas{flex:1;display:block;touch-action:none}
canvas.can-draw{cursor:crosshair}
canvas.no-draw{cursor:not-allowed}

/* Drawing indicator */
.draw-ind{position:absolute;top:52px;left:12px;font-size:12px;color:var(--accent2);background:rgba(0,210,170,.1);border:1px solid rgba(0,210,170,.25);padding:4px 10px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:5}
.draw-ind.show{opacity:1}

/* Waiting overlay */
.waiting{position:absolute;inset:0;background:rgba(14,15,20,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;backdrop-filter:blur(4px);transition:opacity .4s}
.waiting.hidden{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.w-text{font-size:14px;color:var(--muted)}
.w-name{font-size:17px;font-weight:600;color:var(--text)}

/* Video panel */
.video-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border)}
.video-stack{flex:1;display:flex;flex-direction:column;overflow:hidden}
.vslot{flex:1;position:relative;background:#0a0b10;overflow:hidden;border-bottom:1px solid var(--border)}
.vslot video{width:100%;height:100%;object-fit:cover;display:block}
.vlabel{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:500;color:white;background:rgba(0,0,0,.55);padding:3px 8px;border-radius:5px;backdrop-filter:blur(6px);pointer-events:none}
.no-vid{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--border)}
.fs-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:6px;background:rgba(0,0,0,.5);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .2s;backdrop-filter:blur(4px)}
.vslot:hover .fs-btn{opacity:1}

/* Draw permission toggle — tutor only */
.perm-row{padding:10px 14px;border-bottom:1px solid var(--border);display:none;align-items:center;justify-content:space-between;gap:8px}
.perm-row.show{display:flex}
.perm-label{font-size:12px;color:var(--muted)}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.3s}
.tslider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked+.tslider{background:var(--accent2)}
.toggle input:checked+.tslider::before{transform:translateX(16px)}

/* Controls */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;border-top:1px solid var(--border)}
.ctrl-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;background:var(--surface2);color:var(--text)}
.ctrl-btn:hover{transform:scale(1.08)}
.ctrl-btn.off{opacity:.45}
.ctrl-btn.end{background:var(--danger);color:white;border-color:var(--danger)}
.ctrl-btn.end:hover{background:#e0003d}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:13px;color:var(--text);opacity:0;pointer-events:none;transition:all .3s;z-index:9998;max-width:320px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Overlay screens (error / ended) */
.oscreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;padding:24px;text-align:center}
.oscreen.show{display:flex}
.oicon{font-size:48px}
.otitle{font-size:20px;font-weight:600}
.omsg{font-size:14px;color:var(--muted);max-width:340px;line-height:1.7}
.obtn{margin-top:8px;padding:10px 28px;border-radius:8px;background:var(--accent);color:white;border:none;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-dot"></div>TutorConnect</div>
  <div class="user-badge">
    <div class="user-avatar" id="userAvatar"></div>
    <span id="userNameLabel">—</span>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<div class="main">

  <!-- Whiteboard -->
  <div class="wb-panel">
    <div class="toolbar">
      <span class="tb-label">Board</span>
      <div class="divider"></div>
      <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color-swatch" style="background:#6c63ff" data-color="#6c63ff"></div>
      <div class="color-swatch" style="background:#00d2aa" data-color="#00d2aa"></div>
      <div class="color-swatch" style="background:#ff4d6d" data-color="#ff4d6d"></div>
      <div class="color-swatch" style="background:#ffd166" data-color="#ffd166"></div>
      <div class="divider"></div>
      <button class="tool-btn" id="eraserBtn" title="Eraser">⌫</button>
      <div class="divider"></div>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="20" value="3"/>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <div class="draw-banner" id="drawBanner"></div>
    <canvas id="whiteboard"></canvas>
    <div class="draw-ind" id="drawInd"></div>

    <div class="waiting" id="waitingOverlay">
      <div class="spinner"></div>
      <div class="w-text">Waiting for</div>
      <div class="w-name" id="waitingName">the other participant</div>
      <div class="w-text" id="waitingSubtext">to join the session…</div>
    </div>
  </div>

  <!-- Video -->
  <div class="video-panel">

    <!-- Tutor-only draw permission toggle -->
    <div class="perm-row" id="permRow">
      <span class="perm-label">✏️ Student can draw</span>
      <label class="toggle">
        <input type="checkbox" id="permToggle"/>
        <span class="tslider"></span>
      </label>
    </div>

    <div class="video-stack">
      <div class="vslot" id="localSlot">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="vlabel" id="localLabel">You</div>
        <button class="fs-btn" id="localFsBtn" title="Fullscreen">⛶</button>
      </div>
      <div class="vslot" id="remoteSlot">
        <div class="no-vid" id="remoteNoVid">
          <div class="avatar">👤</div>
          <span id="remoteNoVidName">Waiting…</span>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none"></video>
        <div class="vlabel" id="remoteLabel" style="display:none">—</div>
        <button class="fs-btn" id="remoteFsBtn" style="display:none" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="muteBtn"  title="Mute">🎙️</button>
      <button class="ctrl-btn" id="videoBtn" title="Camera">📷</button>
      <button class="ctrl-btn end" id="endBtn" title="End session">📵</button>
    </div>
  </div>
</div>

<!-- Error screen -->
<div class="oscreen" id="errScreen">
  <div class="oicon">🚫</div>
  <div class="otitle">Cannot join session</div>
  <div class="omsg" id="errMsg">Something went wrong.</div>
</div>

<!-- Ended screen -->
<div class="oscreen" id="endScreen">
  <div class="oicon">✅</div>
  <div class="otitle">Session ended</div>
  <div class="omsg" id="endMsg">This session has ended.</div>
  <button class="obtn" onclick="window.close()">Close</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// Read identity from URL path
// URL: /session/:roomId/:userId
// ─────────────────────────────────────────────
const pathParts = location.pathname.split("/").filter(Boolean);
// pathParts = ["session", "roomId", "userId"]
const roomId = pathParts[1] || "";
const userId = decodeURIComponent(pathParts[2] || "");

if (!roomId || !userId) showError("Invalid session link. Please use your assigned join URL.");

// These will be filled in from server's room-state response
let userName = "";
let userRole = "";
let isTutor  = false;

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const localVideo     = document.getElementById("localVideo");
const remoteVideo    = document.getElementById("remoteVideo");
const remoteNoVid    = document.getElementById("remoteNoVid");
const remoteLabel    = document.getElementById("remoteLabel");
const remoteFsBtn    = document.getElementById("remoteFsBtn");
const remoteNoVidName= document.getElementById("remoteNoVidName");
const statusDot      = document.getElementById("statusDot");
const statusText     = document.getElementById("statusText");
const waitingOverlay = document.getElementById("waitingOverlay");
const waitingName    = document.getElementById("waitingName");
const waitingSubtext = document.getElementById("waitingSubtext");
const userNameLabel  = document.getElementById("userNameLabel");
const userAvatar     = document.getElementById("userAvatar");
const localLabel     = document.getElementById("localLabel");
const drawBanner     = document.getElementById("drawBanner");
const drawInd        = document.getElementById("drawInd");
const permRow        = document.getElementById("permRow");
const permToggle     = document.getElementById("permToggle");
const toast          = document.getElementById("toast");

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, ms = 3000) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), ms);
}
function showError(msg) {
  document.getElementById("errMsg").textContent = msg;
  document.getElementById("errScreen").classList.add("show");
}
function showEnded(msg) {
  document.getElementById("endMsg").textContent = msg || "This session has ended.";
  document.getElementById("endScreen").classList.add("show");
}
function setStatus(text, connected, reconnecting) {
  statusText.textContent = text;
  statusDot.classList.toggle("connected",    !!connected);
  statusDot.classList.toggle("reconnecting", !!reconnecting);
}

// ─────────────────────────────────────────────
// Draw permission
// ─────────────────────────────────────────────
let drawAllowed = false;

function applyDrawPermission(allowed) {
  drawAllowed = isTutor ? true : !!allowed;
  const locked = !drawAllowed;

  document.querySelectorAll(".color-swatch").forEach(e => e.classList.toggle("disabled", locked));
  document.getElementById("eraserBtn").disabled  = locked;
  document.getElementById("clearBtn").disabled   = locked;
  document.getElementById("sizeSlider").disabled = locked;
  canvas.className = locked ? "no-draw" : "can-draw";

  if (!isTutor) {
    drawBanner.classList.add("show");
    if (allowed) {
      drawBanner.className = "draw-banner show unlocked";
      drawBanner.textContent = "✏️ You can now draw on the board";
    } else {
      drawBanner.className = "draw-banner show locked";
      drawBanner.textContent = "🔒 Drawing locked — waiting for tutor to allow";
    }
  }
}

// ─────────────────────────────────────────────
// Socket
// ─────────────────────────────────────────────
const socket = io({
  reconnection:        true,
  reconnectionAttempts:15,
  reconnectionDelay:   1500,
  reconnectionDelayMax:5000,
});

socket.on("connect", () => {
  setStatus("Connected", true);
  if (localStream) socket.emit("join-room", { roomId, userId });
});
socket.on("disconnect",       () => setStatus("Reconnecting…", false, true));
socket.on("reconnect",        () => { setStatus("Connected", true); showToast("🔄 Reconnected"); });
socket.on("reconnect_failed", () => { setStatus("Connection lost"); showToast("❌ Connection lost. Please refresh.", 8000); });
socket.on("join-error",       ({ message }) => showError(message));

// ─────────────────────────────────────────────
// Room state — server sends this after join
// Contains our name, role, and who is already connected
// ─────────────────────────────────────────────
socket.on("room-state", ({ participants, connectedUsers, drawPermission, role, name }) => {
  // Set identity (we now know our name and role from the server)
  userName = name;
  userRole = role;
  isTutor  = role === "tutor";

  userNameLabel.textContent = userName;
  userAvatar.textContent    = userName.charAt(0).toUpperCase();
  userAvatar.classList.add(isTutor ? "role-tutor" : "role-student");
  localLabel.textContent    = `${userName} (You)`;
  if (isTutor) permRow.classList.add("show");

  // Find the other participant for waiting screen labels
  const other = Object.values(participants).find(p => p.userId !== userId);
  if (other) {
    waitingName.textContent      = other.name;
    remoteNoVidName.textContent  = other.name;
    remoteLabel.textContent      = other.name;
  }

  applyDrawPermission(drawPermission);
  if (isTutor) permToggle.checked = drawPermission;

  // If other person is already connected — trigger offer
  const otherOnline = connectedUsers.some(u => u && u.userId !== userId);
  if (otherOnline) {
    waitingSubtext.textContent = "Establishing video connection…";
    startOffer();
  }
});

// ─────────────────────────────────────────────
// Media
// ─────────────────────────────────────────────
let localStream = null;

async function startMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localVideo.srcObject = localStream;
  } catch {
    showToast("⚠️ Camera/mic unavailable — joining without video");
    localStream = new MediaStream();
  }
  socket.emit("join-room", { roomId, userId });
}

// ─────────────────────────────────────────────
// WebRTC
// ─────────────────────────────────────────────
let pc              = null;
let remoteDescSet   = false;
let iceCandQueue    = [];
let isMuted         = false;
let isVideoOff      = false;

const iceConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302"  },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "stun:stun2.l.google.com:19302" },
  ],
};

function createPeer() {
  if (pc) { pc.close(); pc = null; }
  remoteDescSet = false;
  iceCandQueue  = [];

  const conn = new RTCPeerConnection(iceConfig);
  localStream.getTracks().forEach(t => conn.addTrack(t, localStream));

  conn.ontrack = ({ streams }) => {
    remoteVideo.srcObject       = streams[0];
    remoteVideo.style.display   = "block";
    remoteNoVid.style.display   = "none";
    remoteLabel.style.display   = "block";
    remoteFsBtn.style.display   = "block";
    waitingOverlay.classList.add("hidden");
    setStatus("Connected", true);
  };

  conn.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit("ice-candidate", { roomId, candidate });
  };

  conn.onconnectionstatechange = () => {
    const s = conn.connectionState;
    if (s === "connected")   setStatus("Connected", true);
    if (s === "connecting")  setStatus("Connecting…", false, true);
    if (s === "failed")      { setStatus("Reconnecting…", false, true); setTimeout(startOffer, 2000); }
    if (s === "disconnected"){ setStatus("Reconnecting…", false, true); }
  };

  return conn;
}

async function startOffer() {
  pc = createPeer();
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("offer", { roomId, offer });
  } catch (e) { console.error("[startOffer]", e); }
}

async function flushIceCandidates() {
  for (const c of iceCandQueue) {
    await pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
  }
  iceCandQueue = [];
}

socket.on("peer-joined", ({ name, role }) => {
  remoteLabel.textContent      = name;
  remoteNoVidName.textContent  = name;
  waitingName.textContent      = name;
  waitingSubtext.textContent   = "Establishing video connection…";
  showToast(`👋 ${name} joined`);
  startOffer();
});

socket.on("offer", async ({ offer }) => {
  pc = createPeer();
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    remoteDescSet = true;
    await flushIceCandidates();
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("answer", { roomId, answer });
  } catch (e) { console.error("[offer]", e); }
});

socket.on("answer", async ({ answer }) => {
  if (!pc) return;
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    remoteDescSet = true;
    await flushIceCandidates();
  } catch (e) { console.error("[answer]", e); }
});

socket.on("ice-candidate", async ({ candidate }) => {
  if (!pc) return;
  if (!remoteDescSet) { iceCandQueue.push(candidate); return; }
  await pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
});

socket.on("peer-left", ({ name }) => {
  remoteVideo.style.display  = "none";
  remoteNoVid.style.display  = "flex";
  remoteLabel.style.display  = "none";
  remoteFsBtn.style.display  = "none";
  waitingOverlay.classList.remove("hidden");
  waitingSubtext.textContent = "to rejoin the session…";
  setStatus("Waiting…");
  showToast(`${name} left the session`);
});

socket.on("session-ended", ({ reason } = {}) => {
  pc?.close();
  localStream?.getTracks().forEach(t => t.stop());
  showEnded(reason);
});

// ─────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────
document.getElementById("muteBtn").onclick = () => {
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const b = document.getElementById("muteBtn");
  b.textContent = isMuted ? "🔇" : "🎙️";
  b.classList.toggle("off", isMuted);
};

document.getElementById("videoBtn").onclick = () => {
  isVideoOff = !isVideoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  const b = document.getElementById("videoBtn");
  b.textContent = isVideoOff ? "🚫" : "📷";
  b.classList.toggle("off", isVideoOff);
};

document.getElementById("endBtn").onclick = () => {
  if (confirm("End this session?")) {
    pc?.close();
    localStream?.getTracks().forEach(t => t.stop());
    showEnded("You ended the session.");
  }
};

// Fullscreen
function toggleFs(el) {
  if (!document.fullscreenElement) el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
}
document.getElementById("localFsBtn").onclick  = () => toggleFs(document.getElementById("localSlot"));
document.getElementById("remoteFsBtn").onclick = () => toggleFs(document.getElementById("remoteSlot"));

// Draw permission toggle (tutor)
permToggle.addEventListener("change", () => {
  socket.emit("set-draw-permission", { roomId, allowed: permToggle.checked });
});

socket.on("draw-permission-changed", ({ allowed }) => {
  applyDrawPermission(allowed);
  if (isTutor) {
    permToggle.checked = allowed;
    showToast(allowed ? "✏️ Student can now draw" : "🔒 Student drawing locked");
  } else {
    showToast(allowed ? "✏️ You can now draw!" : "🔒 Drawing locked by tutor");
  }
});

// ─────────────────────────────────────────────
// Whiteboard
// ─────────────────────────────────────────────
const canvas = document.getElementById("whiteboard");
const ctx    = canvas.getContext("2d");
let drawing  = false, lx = 0, ly = 0;
let penColor = "#ffffff", penSize = 3, isEraser = false;
let drawIndTimer = null;
let boardSnap = null;

function resizeCanvas() {
  if (canvas.width > 0 && canvas.height > 0) boardSnap = canvas.toDataURL();
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  if (boardSnap) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = boardSnap;
  }
}
new ResizeObserver(resizeCanvas).observe(canvas);
resizeCanvas();

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return {
    x: (s.clientX - r.left) * (canvas.width  / r.width),
    y: (s.clientY - r.top)  * (canvas.height / r.height),
  };
}

function stroke(x0, y0, x1, y1, color, size, eraser) {
  ctx.globalCompositeOperation = eraser ? "destination-out" : "source-over";
  ctx.strokeStyle = color;
  ctx.lineWidth   = size;
  ctx.lineCap = ctx.lineJoin = "round";
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
}

canvas.addEventListener("pointerdown", e => {
  if (!drawAllowed) return;
  drawing = true;
  const p = getPos(e); lx = p.x; ly = p.y;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  if (!drawing || !drawAllowed) return;
  const { x, y } = getPos(e);
  stroke(lx, ly, x, y, penColor, penSize, isEraser);
  socket.emit("draw", { roomId, data: { x0: lx, y0: ly, x1: x, y1: y, color: penColor, size: penSize, eraser: isEraser } });
  lx = x; ly = y;
});
canvas.addEventListener("pointerup",     () => drawing = false);
canvas.addEventListener("pointercancel", () => drawing = false);

socket.on("draw", ({ x0, y0, x1, y1, color, size, eraser, senderName }) => {
  stroke(x0, y0, x1, y1, color, size, eraser);
  drawInd.textContent = `✏️ ${senderName || "Other"} is drawing…`;
  drawInd.classList.add("show");
  clearTimeout(drawIndTimer);
  drawIndTimer = setTimeout(() => drawInd.classList.remove("show"), 1500);
});

socket.on("clear-board", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  boardSnap = null;
});

document.querySelectorAll(".color-swatch").forEach(el => {
  el.addEventListener("click", () => {
    if (!drawAllowed) return;
    document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    penColor = el.dataset.color;
    isEraser = false;
    document.getElementById("eraserBtn").classList.remove("active");
  });
});
document.getElementById("eraserBtn").addEventListener("click", () => {
  if (!drawAllowed) return;
  isEraser = !isEraser;
  document.getElementById("eraserBtn").classList.toggle("active", isEraser);
});
document.getElementById("sizeSlider").addEventListener("input", e => penSize = +e.target.value);
document.getElementById("clearBtn").addEventListener("click", () => {
  if (!drawAllowed) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  boardSnap = null;
  socket.emit("clear-board", { roomId });
});

// ─────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────
applyDrawPermission(false);
startMedia();
</script>
</body>
</html>
